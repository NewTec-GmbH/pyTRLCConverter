name: Test

# Controls when the action will run.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  release:
    # A release, pre-release, or draft of a release is published.
    types: [published]
  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel.
jobs:
  # The introduction just shows some useful information.
  intro:
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest
    # Steps represent a sequence of tasks that will be executed as part of the job.
    steps:
      - run: echo "The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "The name of the branch is ${{ github.ref }} and the repository is ${{ github.repository }}."

  trace:
    # The type of runner that the job will run on.
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    # Steps represent a sequence of tasks that will be executed as part of the job.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install "pyTRLCConverter>=2.0.0"

      - name: Analysing all TRLC related elements
        run: |
          trlc ./trlc

      - name: Prepare test report (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pushd ./tools/testReport
          ./make_rst.sh
          popd

      - name: Prepare test report (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          pushd tools\testReport
          call make_rst.bat
          popd

      - name: Install Graphviz (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y graphviz

      - name: Install Graphviz (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install graphviz --no-progress -y

      - name: Build tracing report (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pushd ./tools/traceReport
          ./make.sh online
          rm -f ./out/*-lobster.json
          popd

      - name: Build tracing report (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          pushd tools\traceReport
          call make.bat online
          del /q out\*-lobster.json
          popd

      - name: Upload tracing report
        uses: actions/upload-artifact@v7
        with:
          name: tracing-report-${{ matrix.os }}
          path: ./tools/traceReport/out/*.html

  lint:
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest
    needs: intro
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    # Steps represent a sequence of tasks that will be executed as part of the job.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install .

      - name: Analysing the code with pylint
        run: |
          pylint ./src ./tests ./tools

  test:
    # The type of runner that the job will run on.
    runs-on: ${{ matrix.os }}
    needs: intro
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    # Steps represent a sequence of tasks that will be executed as part of the job.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install .

      - name: Test and create coverage report
        run: |
          pytest tests -v --cov=./src --cov-report=term

  test-toolchain:
    # Run the full tool toolchain to check for any errors.
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install .

      - name: Install Graphviz (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y graphviz

      - name: Install Graphviz (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install graphviz --no-progress -y

      - name: Run full toolchain (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pushd ./tools
          ./make_html.sh
          popd

      - name: Run full toolchain (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          pushd tools
          call make_html.bat
          popd
