# Deploy documentation on Github Pages.
#
# Folder structure on gh-pages branch:
# index.html (routes always to the latest stable version)
# /stable (alias for the latest stable version in the main branch)
# /unstable (alias for the latest development version in the develop branch)
# /v1.0.0 (example release tag)
# /v1.1.0 (example release tag)
# /versions/version_selector_data.js (shared version selector data for all versions)
name: Deploy Github Pages

on:
  release:
    # A release, pre-release, or draft of a release is published.
    types: [published]
  # Deploy documentation when changes are merged/pushed to main development branches.
  push:
    branches:
      - main
      - develop
  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel.
jobs:
  # The introduction just shows some useful information.
  intro:
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest
    # Steps represent a sequence of tasks that will be executed as part of the job.
    steps:
      # Print which event triggered this workflow run.
      - run: echo "The job was automatically triggered by a ${{ github.event_name }} event."
      # Print branch and repository context for quick debugging.
      - run: echo "The name of the branch is ${{ github.ref }} and the repository is ${{ github.repository }}."

  # Build and deploy to gh-pages branch.
  build-and-deploy:
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest
    env:
      DOCS_VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name == 'main' && 'latest' || github.ref_name == 'develop' && 'unstable' || github.ref_name }}
      DOCS_VERSIONS: unstable
      PLANTUML: ${{ vars.PLANTUML_SERVER_URL }}
      PLANTUML_VERIFY_SSL: "false"

    # Steps represent a sequence of tasks that will be executed as part of the job.
    steps:
      # Cache pip downloads to speed up repeated workflow runs.
      - name: Setup cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Checkout complete git history so all tags are available.
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Build DOCS_VERSIONS from all tags and export it for later steps.
      - name: Build docs versions from git tags
        shell: bash
        run: |
          TAG_VERSIONS=$(git tag --sort=-v:refname | paste -sd, -)
          if [ -n "$TAG_VERSIONS" ]; then
            echo "DOCS_VERSIONS=latest,unstable,$TAG_VERSIONS" >> "$GITHUB_ENV"
          fi

      # Prepare the Python runtime used by docs tooling.
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # Install system and Python dependencies needed to build documentation.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz curl default-jre
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install .

      # Run the project docs generation script.
      - name: Run tools workflow
        run: |
          pushd ./tools
          chmod +x make_html.sh
          ./make_html.sh online
          rm -f ./deployDoc/build/html/coverage/.gitignore
          popd

      # Debug step to show the generated documentation files in the workflow logs.
      - name: Show generated documentation files for debugging
        run: |
          pushd ./tools
          find
          popd

      # Publish generated HTML documentation to the target version folder on gh-pages.
      - name: Deploy static files to GitHub Pages
        id: deploy_docs
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./tools/deployDoc/build/html
          # main -> latest, develop -> unstable, release tag -> tag name, otherwise branch name
          destination_dir: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name == 'main' && 'latest' || github.ref_name == 'develop' && 'unstable' || github.ref_name }}

      # Publish shared version selector metadata for release builds only.
      - name: Deploy version selector data (only for releases) to GitHub Pages
        if: ${{ github.event_name == 'release' }}
        id: deploy_version_selector_data
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git checkout gh-pages  # untracked files from documentation generation unaffected by checkout.
          rm -rf ./versions/*
          cp ./tools/deployDoc/build/html/_static/version_selector_data.js ./versions/version_selector_data.js
          git add versions
          git diff-index --quiet HEAD || git commit -m "Update version selector data for release ${{ github.event.release.tag_name }}"
          git push origin gh-pages
          git checkout main

  # Build the package distribution and upload it as a workflow artifact.
  build-dist:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Rewrite relative README links to absolute for PyPI
        run: |
          python -c "
          import re, pathlib
          tag = '${{ github.event.release.tag_name }}'
          base = 'https://github.com/NewTec-GmbH/pyTRLCConverter/tree/' + tag + '/'
          readme = pathlib.Path('README.md')
          readme.write_text(re.sub(r'\]\(\.\/', '](' + base, readme.read_text()))
          "

      - name: Build distribution
        run: |
          SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct) \
          python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 5

  # Publish the pre-built artifacts to PyPI on release.
  publish-pypi:
    runs-on: ubuntu-latest
    needs: build-dist
    if: github.event_name == 'release'
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
